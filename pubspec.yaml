name: flutter_application_1
description: 'A new Flutter project.'
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  image_picker: ^1.1.2
  http: ^1.2.0
  shared_preferences: ^2.3.0
  vector_math: ^2.1.4
